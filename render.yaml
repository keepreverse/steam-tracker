services:
  - type: web
    name: steam-tracker
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STEAM_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: steam-tracker-db
          property: connectionString

databases:
  - name: steam-tracker-db
    plan: free
